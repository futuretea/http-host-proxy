# HTTP Host Proxy Configuration Example
# Save as config.yaml and use with: ./http-host-proxy --config config.yaml

# Proxy listen address (default: :8080)
proxy_listen: ":8080"

# Default scheme for proxied requests (http or https, default: http)
default_scheme: "http"

# Host to scheme mapping (optional)
# Override the default scheme for specific hosts
# YAML format (for config file):
host_scheme_map:
  secure.example.com: "https"
  insecure.local: "http"

# Environment variable format:
# HTTP_HOST_PROXY_HOST_SCHEME_MAP="secure.example.com=https,insecure.local=http"

# Allowed hosts (optional)
# If specified, only these hosts will be proxied
# Leave empty to allow all hosts (except blocked ones)
# YAML format:
allowed_hosts:
  - "api.example.com"
  - "web.example.com"

# Environment variable format:
# HTTP_HOST_PROXY_ALLOWED_HOSTS="api.example.com,web.example.com"

# Blocked hosts (optional)
# These hosts will never be proxied, even if in allowed_hosts
# YAML format:
blocked_hosts:
  - "internal.example.com"
  - "admin.example.com"

# Environment variable format:
# HTTP_HOST_PROXY_BLOCKED_HOSTS="internal.example.com,admin.example.com"

# Extra request headers (optional)
# Headers to add to all proxied requests
# YAML format:
extra_request_headers:
  X-Forwarded-Proto: "https"
  X-Custom-Header: "value"

# Environment variable format:
# HTTP_HOST_PROXY_EXTRA_REQUEST_HEADERS="X-Forwarded-Proto=https,X-Custom-Header=value"

# Maximum request body size in bytes (default: 10485760 = 10MB)
# Set to 0 for unlimited
max_request_body_size: 10485760

# Transport tuning
# Maximum idle connections across all hosts (default: 200)
max_idle_conns: 200

# Maximum idle connections per host (default: 100)
max_idle_conns_per_host: 100

# Idle connection timeout in seconds (default: 90)
idle_conn_timeout: 90

# Dial timeout in seconds (default: 30)
dial_timeout: 30

# TLS handshake timeout in seconds (default: 10)
tls_handshake_timeout: 10

# Response header timeout in seconds (default: 30)
response_header_timeout: 30

# TLS configuration for backend connections
# Skip TLS certificate verification for backend (default: false)
# WARNING: Only enable in development/testing environments
tls_insecure: false

# TLS configuration for proxy server
# Enable TLS/HTTPS for proxy server (default: false)
tls_enabled: false

# TLS certificate file path (required when tls_enabled is true)
# tls_cert_file: "/path/to/cert.pem"

# TLS private key file path (required when tls_enabled is true)
# tls_key_file: "/path/to/key.pem"

# Log level (trace, debug, info, warn, error, fatal, panic)
# Default: info
log_level: info

# pprof profiling server listen address (optional)
# Enable performance profiling on a separate HTTP port
# Leave empty to disable pprof
# Example: ":6060" or "127.0.0.1:6060" (recommended for security)
# pprof_listen: ":6060"
